name: Build and deploy to GitHub Pages

# 実行タイミング:
#  - main への push(コード変更時)
#  - 30分ごとのスケジュール実行(ニュースの自動更新のため)
#  - 手動実行(workflow_dispatch)
#
# 補足: news.json の自動コミットもこのワークフロー内で行う。GITHUB_TOKEN による
# pushはGitHub側の仕様で別ワークフローの再トリガーを起こさないため、
# 「更新→ビルド→デプロイ」を1本のワークフローにまとめて完結させている。
on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Astro 7 は Node.js 22.12.0 以上が必須(20系はビルド時にエラーになる)
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest NPB news
        run: npm run fetch-news

      - name: Commit updated news.json if changed
        run: |
          if git diff --quiet -- src/data/news.json; then
            echo "No news changes."
          else
            git config user.name "npb-curation-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/news.json
            git commit -m "chore: update news feed"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
