name: Build and deploy to GitHub Pages

# 実行タイミング:
#  - master への push(コード変更時)
#  - 30分ごとのスケジュール実行(ニュースの自動更新のため)
#  - 手動実行(workflow_dispatch)
#
# 補足: news.json の自動コミットもこのワークフロー内で行う。GITHUB_TOKEN による
# pushはGitHub側の仕様で別ワークフローの再トリガーを起こさないため、
# 「更新→ビルド→デプロイ」を1本のワークフローにまとめて完結させている。
#
# 注意: このリポジトリのデフォルトブランチはmasterのため、mainではなくmaster
# を対象にしている。あわせてリポジトリの Settings → Environments →
# github-pages → Deployment branches and tags で master からのデプロイを
# 許可しておく必要がある(未設定だと "environment protection rules" エラーで
# デプロイが拒否される)。
#
# 重要: schedule(cronの定期実行)イベントは特定のpushに紐づかないため、
# actions/checkoutはrefを明示しない限り「リポジトリの既定ブランチ
# (Settings → General → Default branch)」をチェックアウトする。この既定
# ブランチ設定がGitHub側でmainのまま(=このワークフロー側の想定と食い違って
# いる)だと、30分おきの自動実行のたびにmainをチェックアウトし、news.jsonの
# 更新もmainへpushしてしまい、そのmain上のビルドはgithub-pages環境の
# デプロイ許可ブランチ(master)に一致せず毎回「Failed to deploy」になる
# ——という事故が実際に起きたため、ここではrefとpush先をmasterに固定し、
# リポジトリの既定ブランチ設定が何であっても正しく動くようにしている。
#
# 重要: concurrency.group は実行トリガーの種類ごとに分けている(下記concurrency
# 参照)。以前は "pages" という1つのグループに push・schedule・workflow_dispatch
# すべてをまとめていたが、GitHub Actionsのconcurrency仕様上「実行中1件+待機中
# 1件」までしか保持されず、待機中に新しいトリガーが来ると待機中だった方は
# キャンセルされ新しい方に置き換わる。手動でのコード更新pushを短時間に何度も
# 行うと、そのたびに30分おきのschedule実行の待機枠が奪われてキャンセルされ、
# 自動更新が長時間止まってしまう事故が実際に起きたため、トリガー種類ごとに
# グループを分離した。この場合、schedule実行とpush実行が同時に走る可能性が
# 生まれるため、git pushがコンフリクトした場合はリベースして再試行するように
# している(下記「Commit updated news.json / results.json if changed」参照)。
on:
  push:
    branches: [master]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.event_name }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Astro 7 は Node.js 22.12.0 以上が必須(20系はビルド時にエラーになる)
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest NPB news
        run: npm run fetch-news

      - name: Fetch latest NPB game results
        # データ元はWikipediaの各球団年度別ページ(CC BY-SA)。npb.jp公式サイトや
        # 主要スポーツサイトは「二次利用・無断転載禁止」を明記しているため、
        # 明示的に再利用が許可されているこちらを使っている(scripts/fetch-results.mjs
        # 冒頭のコメント参照)。個別球団の取得に失敗しても前回値を維持するため、
        # このステップ自体が全体を失敗させることは基本的にない。
        run: npm run fetch-results

      - name: Commit updated news.json / results.json if changed
        run: |
          if git diff --quiet -- src/data/news.json src/data/results.json; then
            echo "No data changes."
          else
            git config user.name "npb-curation-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/news.json src/data/results.json
            git commit -m "chore: update news feed and game results"
            # concurrency.groupをトリガー種類ごとに分けたため、schedule実行と
            # push実行のgit pushが同時に走る可能性がある。非fast-forwardで
            # 拒否された場合は最新masterにリベースして再試行する(最大3回)。
            for i in 1 2 3; do
              if git push origin HEAD:master; then
                break
              fi
              echo "push failed (attempt $i/3), rebasing onto latest master and retrying..."
              git fetch origin master
              git rebase origin/master
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
